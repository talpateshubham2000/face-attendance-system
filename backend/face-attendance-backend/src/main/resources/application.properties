# ================== SERVER ==================
server.port=8080

# ================== DATABASE (MySQL) ==================
# Update these as per your local MySQL setup

spring.datasource.url=${DB_URL}

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# ================== IF YOU WANT TO TEST QUICKLY WITHOUT MYSQL ==================
# Comment the MySQL block above and uncomment below to use in-memory H2 DB instead
# spring.datasource.url=jdbc:h2:mem:facedb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# ================== JWT (simple stateless auth) ==================
# IMPORTANT: change this secret before any real deployment

jwt.secret=${JWT_SECRET}

jwt.expiration-ms=86400000

# ================== PYTHON FASTAPI FACE SERVICE ==================
# Base URL of the Python microservice that does face detection/recognition
python.service.base-url=${PYTHON_SERVICE_URL}

# Cosine similarity threshold to consider two faces a match (0.0 - 1.0)
# The Python service now uses a real face-recognition model (MobileFaceNet,
# ONNX) instead of raw landmark geometry - same person typically scores
# 0.5-0.99+, different people typically score near 0 or negative. 0.40 is a
# safe starting point; raise it if you see false matches, lower it if the
# real registered user isn't being recognized.
face.match.threshold=0.40

# ================== FILE UPLOAD (base64 images can be large) ==================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
